<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS — Giriş</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">🎓</div>
        <h1>Öğrenci Bilgi Sistemi</h1>
        <p>Hesabınıza giriş yapın</p>
      </div>

      <div id="error-msg" class="alert alert-error" style="display:none"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="student-id">Öğrenci Numarası</label>
          <input
            type="text" id="student-id" class="form-control"
            placeholder="Öğrenci numaranızı girin"
            autocomplete="username" inputmode="numeric"
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Şifre</label>
          <input
            type="password" id="password" class="form-control"
            placeholder="Şifrenizi girin"
            autocomplete="current-password"
          >
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding:10px;">
          Giriş Yap
        </button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--gray-400);">
        Demo: <strong>250206022</strong> / <strong>password123</strong>
      </p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (getSession()) window.location.href = "dashboard.html";

    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      const id  = document.getElementById("student-id").value.trim();
      const pwd = document.getElementById("password").value;
      const err = document.getElementById("error-msg");

      if (!id || !pwd) {
        err.textContent = "Lütfen öğrenci numaranızı ve şifrenizi girin.";
        err.style.display = "flex";
        return;
      }

      if (await login(id, pwd)) {
        window.location.href = "dashboard.html";
      } else {
        err.textContent = "Öğrenci numarası veya şifre hatalı.";
        err.style.display = "flex";
        document.getElementById("student-id").classList.add("error");
        document.getElementById("password").classList.add("error");
      }
    });

    ["student-id", "password"].forEach(id => {
      document.getElementById(id).addEventListener("input", () => {
        document.getElementById("error-msg").style.display = "none";
        document.getElementById(id).classList.remove("error");
      });
    });
  </script>
</body>
</html>
